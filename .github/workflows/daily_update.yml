name: PA-jobb Uppsala – Daglig uppdatering

on:
  schedule:
    - cron: "0 5 * * *"   # 07:00 Swedish winter time
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openpyxl lxml

      - name: Run PA job updater
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python scripts/update_jobs.py

      - name: Commit updated files
        run: |
          git config --global user.name  "PA-agent"
          git config --global user.email "pa-agent@github-actions"
          git add PA_Jobb_Uppsala_Gunsta.xlsx scripts/seen_jobs.json docs/index.html
          git diff --staged --quiet || (
            git commit -m "Auto: PA-jobb uppdatering $(date +%Y-%m-%d)" &&
            git pull --rebase &&
            git push
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    needs: update-jobs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload docs folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
