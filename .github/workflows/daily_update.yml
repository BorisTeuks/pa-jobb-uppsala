name: PA-jobb Uppsala – Daglig uppdatering

on:
  schedule:
    # Runs every day at 05:00 UTC = 07:00 Swedish winter time
    - cron: "0 5 * * *"
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  update-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openpyxl lxml

      - name: Run PA job updater
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python scripts/update_jobs.py

      - name: Commit updated files
        run: |
          git config --global user.name  "PA-agent"
          git config --global user.email "pa-agent@github-actions"
          git add PA_Jobb_Uppsala_Gunsta.xlsx scripts/seen_jobs.json
          git diff --staged --quiet || (
            git commit -m "Auto: PA-jobb uppdatering $(date +%Y-%m-%d)" &&
            git pull --rebase &&
            git push
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
